<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMING SOON — brace yourself</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00ffcc;
    --pink: #ff2d78;
    --yellow: #ffe600;
    --bg: #050510;
    --white: #f0f0f0;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Space Mono', monospace;
    color: var(--white);
    cursor: none;
  }

  /* ── CURSOR ── */
  #cursor {
    position: fixed; top: 0; left: 0; z-index: 9999;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--neon);
    mix-blend-mode: difference;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.05s linear;
    box-shadow: 0 0 20px var(--neon), 0 0 60px var(--neon);
  }

  /* ── CANVAS BG ── */
  #bg-canvas {
    position: fixed; inset: 0; z-index: 0;
  }

  /* ── GLITCH LINES ── */
  .glitch-bar {
    position: fixed; left: 0; width: 100%; height: 2px;
    background: var(--pink);
    opacity: 0;
    animation: glitch-bar 4s infinite;
    z-index: 1;
    mix-blend-mode: screen;
  }
  .glitch-bar:nth-child(2) { animation-delay: 1.3s; background: var(--neon); }
  .glitch-bar:nth-child(3) { animation-delay: 2.7s; background: var(--yellow); }

  @keyframes glitch-bar {
    0%   { opacity: 0; top: -10%; }
    2%   { opacity: 0.8; top: 20%; }
    4%   { opacity: 0; top: 20%; }
    6%   { opacity: 0.6; top: 55%; }
    8%   { opacity: 0; top: 80%; }
    100% { opacity: 0; top: 80%; }
  }

  /* ── MAIN WRAPPER ── */
  #wrap {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── SCANLINES OVERLAY ── */
  #wrap::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none; z-index: 20;
  }

  /* ── EYEBALL ── */
  #eyeball-wrap {
    position: relative; margin-bottom: -10px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  #eyeball {
    width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #fff 28%, #b3e0ff 48%, #0066ff 62%, #001133 100%);
    box-shadow: 0 0 30px #0066ff, 0 0 80px rgba(0,102,255,0.4);
    position: relative; overflow: hidden;
  }
  #eyeball::after {
    content: '';
    position: absolute; width: 22px; height: 22px; border-radius: 50%;
    background: #000;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: inset 0 0 6px #000a;
    transition: transform 0.1s;
  }
  #eye-shine {
    position: absolute; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.5);
    top: 18%; left: 22%;
    pointer-events: none;
    z-index: 2;
  }

  /* ── HEADLINE GLITCH ── */
  .headline {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    line-height: 0.92;
    letter-spacing: -2px;
    text-align: center;
    position: relative;
    text-transform: uppercase;
    color: var(--white);
    animation: text-flicker 6s infinite;
  }
  .headline span { color: var(--neon); }
  .headline::before,
  .headline::after {
    content: attr(data-text);
    position: absolute; top: 0; left: 0; width: 100%;
    font-family: inherit; font-size: inherit; line-height: inherit;
    letter-spacing: inherit; text-align: inherit;
  }
  .headline::before {
    color: var(--pink);
    clip: rect(44px, 9999px, 56px, 0);
    animation: glitch1 3s infinite linear;
    text-shadow: -2px 0 var(--pink);
  }
  .headline::after {
    color: var(--neon);
    clip: rect(66px, 9999px, 80px, 0);
    animation: glitch2 2.5s infinite linear;
    text-shadow: 2px 0 var(--neon);
  }
  @keyframes glitch1 {
    0%  { clip: rect(44px, 9999px, 56px, 0); transform: skew(0.3deg); }
    20% { clip: rect(10px, 9999px, 18px, 0); transform: skew(-0.3deg); }
    40% { clip: rect(88px, 9999px, 98px, 0); transform: skew(0.5deg); }
    60% { clip: rect(30px, 9999px, 38px, 0); transform: skew(-0.1deg); }
    80% { clip: rect(72px, 9999px, 82px, 0); transform: skew(0.2deg); }
    100%{ clip: rect(44px, 9999px, 56px, 0); transform: skew(0.3deg); }
  }
  @keyframes glitch2 {
    0%  { clip: rect(66px, 9999px, 80px, 0); transform: translate(-2px); }
    33% { clip: rect(20px, 9999px, 28px, 0); transform: translate(2px); }
    66% { clip: rect(50px, 9999px, 62px, 0); transform: translate(-1px); }
    100%{ clip: rect(66px, 9999px, 80px, 0); transform: translate(-2px); }
  }
  @keyframes text-flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }

  /* ── SUB TEXT ── */
  .sub {
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 10px;
    text-align: center;
    animation: fadein 2s 0.5s both;
  }
  @keyframes fadein { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }

  /* ── COUNTDOWN ── */
  #countdown {
    display: flex; gap: clamp(8px, 2vw, 24px);
    margin-top: 28px;
    animation: fadein 2s 0.8s both;
  }
  .cd-unit {
    display: flex; flex-direction: column; align-items: center;
  }
  .cd-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4.5rem);
    line-height: 1;
    color: var(--neon);
    text-shadow: 0 0 20px var(--neon), 0 0 60px rgba(0,255,204,0.3);
    min-width: 2ch; text-align: center;
    transition: color 0.2s;
  }
  .cd-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 4px;
  }
  .cd-sep {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4.5rem);
    color: var(--pink);
    line-height: 1;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* ── INPUT ROW ── */
  #notify-row {
    display: flex; gap: 0;
    margin-top: 28px;
    animation: fadein 2s 1.1s both;
    position: relative;
  }
  #email-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,204,0.3);
    border-right: none;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 16px;
    outline: none;
    width: clamp(180px, 28vw, 280px);
    border-radius: 2px 0 0 2px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #email-input::placeholder { color: rgba(255,255,255,0.2); }
  #email-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(0,255,204,0.2);
  }
  #notify-btn {
    background: var(--neon);
    color: #000;
    border: none;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    cursor: pointer;
    border-radius: 0 2px 2px 0;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    text-transform: uppercase;
  }
  #notify-btn:hover {
    background: var(--yellow);
    box-shadow: 0 0 30px rgba(255,230,0,0.5);
    transform: scale(1.04);
  }
  #notify-btn:active { transform: scale(0.97); }
  #confirm-msg {
    position: absolute; bottom: -24px; left: 0; width: 100%;
    font-size: 0.7rem; letter-spacing: 0.2em; text-align: center;
    color: var(--neon); opacity: 0;
    transition: opacity 0.4s;
    text-transform: uppercase;
  }

  /* ── CHAOTIC FLOATING TAGS ── */
  .tag {
    position: fixed; font-family: 'Space Mono', monospace;
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    text-transform: uppercase; letter-spacing: 0.1em;
    opacity: 0.18; pointer-events: none;
    animation: drift linear infinite;
    white-space: nowrap;
    z-index: 2;
  }
  @keyframes drift {
    from { transform: translateY(110vh) rotate(var(--r)); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    to   { transform: translateY(-10vh) rotate(var(--r)); opacity: 0; }
  }

  /* ── CORNER DECOR ── */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    border-color: var(--pink);
    border-style: solid;
    opacity: 0.4;
  }
  .corner.tl { top:20px; left:20px; border-width: 2px 0 0 2px; }
  .corner.tr { top:20px; right:20px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom:20px; left:20px; border-width: 0 0 2px 2px; }
  .corner.br { bottom:20px; right:20px; border-width: 0 2px 2px 0; }

  /* ── BOTTOM STATUS ── */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 8px 20px;
    display: flex; justify-content: space-between;
    font-size: 0.6rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    border-top: 1px solid rgba(255,255,255,0.05);
    z-index: 30;
    text-transform: uppercase;
  }
  #status-bar span { color: var(--neon); }

  /* ── NOISE OVERLAY ── */
  #noise {
    position: fixed; inset: 0; z-index: 5;
    pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    animation: noise-anim 0.5s steps(2) infinite;
  }
  @keyframes noise-anim {
    0%  { background-position: 0 0; }
    25% { background-position: 50px -30px; }
    50% { background-position: -20px 40px; }
    75% { background-position: 80px 10px; }
    100%{ background-position: 0 0; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bg-canvas"></canvas>
<div id="noise"></div>
<div class="glitch-bar"></div>
<div class="glitch-bar"></div>
<div class="glitch-bar"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="wrap">
  <div id="eyeball-wrap">
    <div id="eyeball"><div id="eye-shine"></div></div>
  </div>

  <h1 class="headline" data-text="COMING SOON">COMING <span>SOON</span></h1>
  <p class="sub">something wild is loading into existence</p>

  <div id="countdown">
    <div class="cd-unit"><div class="cd-num" id="cd-d">00</div><div class="cd-label">days</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-h">00</div><div class="cd-label">hrs</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-m">00</div><div class="cd-label">min</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-s">00</div><div class="cd-label">sec</div></div>
  </div>

  <div id="notify-row">
    <input id="email-input" type="email" placeholder="your@email.com" />
    <button id="notify-btn" onclick="handleNotify()">Notify me</button>
    <div id="confirm-msg" id="confirm">✓ you're on the list</div>
  </div>
</div>

<div id="status-bar">
  <div>SYS STATUS: <span id="sys-stat">LOADING</span></div>
  <div>VISITORS: <span id="visitor-count">—</span></div>
  <div>LAST COMMIT: <span>2 hrs ago</span></div>
</div>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── EYEBALL TRACKING ──
const eyeEl = document.getElementById('eyeball');
document.addEventListener('mousemove', e => {
  const r = eyeEl.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const dx = e.clientX - cx, dy = e.clientY - cy;
  const angle = Math.atan2(dy, dx);
  const dist = Math.min(Math.hypot(dx, dy), 14);
  eyeEl.style.setProperty('--ex', Math.cos(angle)*dist + 'px');
  eyeEl.style.setProperty('--ey', Math.sin(angle)*dist + 'px');
  eyeEl.querySelector('::after');
  // move pupil via after pseudo – use overlay div instead
});
// use a real div for pupil
const pupil = document.createElement('div');
pupil.style.cssText = 'position:absolute;width:22px;height:22px;border-radius:50%;background:#000;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:inset 0 0 6px #000a;pointer-events:none;transition:left 0.06s,top 0.06s;';
eyeEl.appendChild(pupil);
document.addEventListener('mousemove', e => {
  const r = eyeEl.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const dx = e.clientX - cx, dy = e.clientY - cy;
  const angle = Math.atan2(dy, dx);
  const dist = Math.min(Math.hypot(dx, dy)*0.18, 13);
  pupil.style.left = (50 + (Math.cos(angle)*dist/r.width)*100) + '%';
  pupil.style.top  = (50 + (Math.sin(angle)*dist/r.height)*100) + '%';
});

// ── CANVAS PARTICLE GRID ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initParticles();
}
function initParticles() {
  particles = [];
  const count = Math.floor(W * H / 9000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.5 + 0.3,
      hue: Math.random() < 0.5 ? 165 : 340
    });
  }
}
let mx = W/2, my = H/2;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    // mouse repulsion
    const dx = p.x - mx, dy = p.y - my;
    const d = Math.hypot(dx, dy);
    if (d < 100) { p.vx += dx/d*0.08; p.vy += dy/d*0.08; }
    // speed cap
    const spd = Math.hypot(p.vx, p.vy);
    if (spd > 1.5) { p.vx = p.vx/spd*1.5; p.vy = p.vy/spd*1.5; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},100%,70%,0.6)`;
    ctx.fill();
    // connect nearby
    for (let j = i+1; j < particles.length; j++) {
      const q = particles[j];
      const d2 = Math.hypot(p.x-q.x, p.y-q.y);
      if (d2 < 80) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `hsla(${p.hue},100%,70%,${0.15*(1-d2/80)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
window.addEventListener('resize', resize);
resize();
drawParticles();

// ── COUNTDOWN (30 days from now) ──
const target = new Date(Date.now() + 30*24*60*60*1000);
function updateCountdown() {
  const diff = target - Date.now();
  if (diff <= 0) return;
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}
setInterval(updateCountdown, 1000);
updateCountdown();

// ── FLOATING TAGS ──
const words = ['git push','npm install','sudo rm -rf','404 not found','merge conflict','it works on my machine','localhost:3000','undefined is not a function','segfault','css is hard','dark mode','null pointer','TODO: fix later','rebase','10x dev','brb deploying','YOLO release','hotfix','cache invalidation','naming things','off by one error','it shipped','¯\\_(ツ)_/¯','build failed','console.log debug'];
const colors = ['#00ffcc','#ff2d78','#ffe600','#ffffff'];
function spawnTag() {
  const el = document.createElement('div');
  el.className = 'tag';
  el.textContent = words[Math.floor(Math.random()*words.length)];
  el.style.color = colors[Math.floor(Math.random()*colors.length)];
  el.style.left = Math.random()*100 + 'vw';
  const dur = 8 + Math.random()*12;
  el.style.animationDuration = dur + 's';
  el.style.setProperty('--r', (Math.random()*30-15)+'deg');
  el.style.animationDelay = '0s';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur*1000+200);
}
setInterval(spawnTag, 700);
for (let i = 0; i < 8; i++) setTimeout(spawnTag, i*200);

// ── STATUS BAR ──
const stats = ['LOADING','BREWING','COMPILING','VIBING','ALMOST'];
let si = 0;
setInterval(() => {
  document.getElementById('sys-stat').textContent = stats[si++ % stats.length];
}, 1800);
document.getElementById('visitor-count').textContent = (Math.floor(Math.random()*800)+200).toLocaleString();

// ── NOTIFY HANDLER ──
function handleNotify() {
  const v = document.getElementById('email-input').value;
  const msg = document.getElementById('confirm-msg');
  if (!v.includes('@')) {
    document.getElementById('email-input').style.borderColor = 'var(--pink)';
    return;
  }
  document.getElementById('email-input').style.borderColor = 'var(--neon)';
  msg.style.opacity = '1';
  document.getElementById('notify-btn').textContent = '✓ Done!';
  setTimeout(() => msg.style.opacity = '0', 3000);
}
</script>
</body>
</html>
