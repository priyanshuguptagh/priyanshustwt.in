<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
}

/* ===== MATRIX GRID BACKGROUND ===== */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: 
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: moveGrid 25s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    0% { transform: translate(0,0); }
    100% { transform: translate(-60px, -60px); }
}

/* SOFT LIGHT GLOW */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.06), transparent 60%);
    z-index: 0;
}

/* ===== MAIN LAYOUT ===== */
main {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.container {
    text-align: center;
    max-width: 600px;
}

/* ===== HEADLINE ===== */
h1 {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 500;
    letter-spacing: -1px;
    line-height: 1.1;
}

/* APPLE STYLE FADE TEXT */
.sub {
    margin-top: 18px;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: rgba(255,255,255,0.5);
}

/* ===== GLASS CARD ===== */
.card {
    margin-top: 40px;
    padding: 22px 28px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.02);
    transition: 0.4s ease;
}

.card:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,0.25);
}

/* DOTS */
.dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 12px;
}

.dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
    opacity: 0.3;
    animation: blink 1.6s infinite;
}

.dot:nth-child(2) { animation-delay: 0.3s; }
.dot:nth-child(3) { animation-delay: 0.6s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
}

/* ===== FOOTER ===== */
footer {
    position: fixed;
    bottom: 18px;
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    z-index: 1;
}

footer span {
    transition: 0.3s;
}

footer span:hover {
    color: #fff;
}

/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 480px) {
    .card {
        padding: 16px 18px;
    }
}
</style>
</head>

<body>

<main>
    <div class="container">
        <h1>Coming Soon</h1>
        <p class="sub">A quiet system is taking shape.</p>

        <div class="card">
            <p style="color: rgba(255,255,255,0.6); font-size: 0.95rem;">
                Precision. Simplicity. Intent.
            </p>

            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</main>

<footer>
    <span>by Priyanshu</span>
</footer>

</body>
</html>
